models:
- name: stg_olist__order_reviews
  description: This model processes and organizes order review data from the Olist
    platform, providing a structured view of customer feedback and ratings for analysis.

  columns:
  - name: review_pk
    description: A technical primary key (surrogate key) generated to ensure the uniqueness of each row in this table. Created from the review_id and order_id columns.
    tests:
      - unique 
      - not_null

  - name: review_id
    description: A unique review identifier.
    tests:
      - not_null

  - name: order_id
    description: A unique order identifier.
    tests:
      - not_null

  - name: review_score
    description: The rating given by the customer, typically on a scale from 1 to 5.

  - name: review_comment_title
    description: The title of the review comment provided by the customer.

  - name: review_comment_message
    description: The detailed message of the review provided by the customer.

  - name: review_creation_date
    description: The date when the review was created.
    
  - name: review_answer_timestamp
    description: The timestamp when the review was responded to.
