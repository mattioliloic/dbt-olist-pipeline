models:
- name: stg_olist__payments
  description: This model processes and organizes payment data from the Olist platform,
    providing a structured view of payment transactions for further analysis and reporting.

  columns:
  - name: payment_pk
    description: A technical primary key (surrogate key) generated to ensure the uniqueness of each row in this table. Created from the order_id and payment_sequential columns.
    tests:
      - unique
      - not_null

  - name: order_id
    description: A unique identifier of an order.
    tests:
      - not_null

  - name: payment_sequential
    description: The sequence number of the payment within the order.

  - name: payment_type
    description: The method of payment used, such as credit card or voucher.

  - name: payment_installments
    description: The number of installments in which the payment is divided.

  - name: payment_value
    description: The total amount of the payment.
