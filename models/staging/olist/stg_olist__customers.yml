models:
  - name: stg_olist__customers
    description: The grain of this table is one unique customer per row.
    columns:
      - name: customer_id
        description: Key to the orders dataset. Each order has a unique customer_id.
        tests:
        - unique
        - not_null

      - name: unique_id
        description: Identifier of a customer.
        tests:
        - not_null

      - name: zipcode
        description: The zipcode prefix of the customer location
        data_tests:
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments: 
                regex: "^[0-9]{4,5}$"

      - name: customer_city
        description: The city of the customer
          
      - name: state
        description: The state prefix of the customer
        data_tests:
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments: 
               regex: "^[A-Z]{2}$"
