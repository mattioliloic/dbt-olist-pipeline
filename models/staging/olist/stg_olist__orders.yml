models:
- name: stg_olist__orders
  description: This model serves as a staging layer for order data from the Olist
    platform. It prepares and organizes order information for further analysis and
    reporting, ensuring data consistency and quality.

  columns:
  - name: order_id
    description: A unique identifier for each order.
    tests:
      - unique
      - not_null

  - name: customer_id
    description: The identifier for the customer who placed the order.
    tests:
      - unique
      - not_null

  - name: status
    description: "{{ doc('status') }}"
    data_tests:
     - accepted_values:
         arguments: 
           values: ['canceled', 'delivered', 'invoiced', 'shipped','approved','processing','unavailable','created']

  - name: order_purchase_timestamp
    description: The timestamp when the order was purchased.

  - name: order_approved_at
    description: The timestamp when the order was approved.

  - name: order_delivered_carrier_date
    description: The date when the order was delivered to the carrier.

  - name: order_delivered_customer_date
    description: The date when the order was delivered to the customer.
    
  - name: order_estimated_delivery_date
    description: The estimated delivery date for the order.
