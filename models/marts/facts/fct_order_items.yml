models:
- name: fct_order_items
  description: This model aggregates and summarizes order item details, providing
    insights into order quantities, pricing, and associated product information. It
    is used to analyze sales performance and inventory management.
  config: 
    contract: 
      enforced: true

  data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "price + freight = total_amount"

  columns:
 
  - name: order_items_pk
    description: "{{ doc('order_items_pk')}}"
    data_type: string
    tests:
    - relationships:
        arguments:
          to: ref('stg_olist__order_items')
          field: order_items_pk

  - name: order_id
    description: "{{ doc('order_id')}}"
    data_type: string
    tests:
    - relationships:
        arguments:
          to: ref('stg_olist__orders')
          field: order_id

  - name: customer_id
    description: "{{ doc('customer_id')}}"
    data_type: string
    tests:
    - relationships:
       arguments:
          to: ref('dim_customers')
          field: customer_id

  - name: seller_id
    description: "{{ doc('seller_id')}}"
    data_type: string
    tests:
    - relationships:
        arguments:
          to: ref('dim_sellers')
          field: seller_id

  - name: product_id
    description: "{{ doc('product_id')}}"
    data_type: string
    tests:
    - relationships:
        arguments:
          to: ref('dim_products')
          field: product_id

  - name: price
    data_type: numeric(10,2)
    description: The price of a single unit of the product.

  - name: freight
    data_type: numeric(10,2)
    description: The freight of an order associated with a product.

  - name: total_amount
    data_type: numeric(10,2)
    description: The total price for the quantity of the product ordered, calculated
      as quantity multiplied by price.
    tests:
      - dbt_expectations.expect_column_values_to_be_between:
          arguments:
            min_value: 0  
            max_value: 100000
            row_condition: "order_items_pk is not null" 
            strictly: false 
  
  - name: purchased_at
    data_type: timestamp_ntz
    description: Gives the timestamp of the moment when the customer made the order.

  - name: is_late
    data_type: boolean
    description: Show if an order has been delivered in the expected delays.

  - name: days_to_delivery
    data_type: numeric(5)
    description: Calculate the days between the moment the customer made the order and the moment it had been delivered.
