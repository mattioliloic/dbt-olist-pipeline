models:
- name: dim_geolocation
  description: This model provides detailed information about geographical locations,
    which can be used for mapping, analysis, and reporting purposes. It serves as
    a reference for location-based data, enabling users to associate events or entities
    with specific geographical areas.

  columns:
  - name: geolocation_pk
    description: "{{ doc('geolocation_pk')}}"
    tests:
      - unique
      - not_null

  - name: latitude
    description: The latitude coordinate of the geographical location.

  - name: longitude
    description: The longitude coordinate of the geographical location.

  - name: gps
    description: The coordinates of the geographical location in a geo format.

  - name: zipcode
    description: The first 5 digits of zip code.

  - name: city
    description: The name of the city for the geographical location.

  - name: state
    description: The name of the state for the geographical location.

  - name: region
    description: The region to which the state belongs.
