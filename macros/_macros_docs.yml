macros:
  - name: days_between_dates
    description: A macro that calculate the number of days between two dates.
    arguments:
      - name: first 
        type: timestamp_ntz 
        description: The start date to start the comparaison
      - name : second
        type: timestamp_ntz 
        description: The second date to be compare with 

  - name: get_delivery_status
    description: A macro that shows the status of an order, after being delivered.
    arguments:
        - name: estimated_date 
          type: timestamp_ntz 
          description: The estimated delivery date 
        - name : actual_date
          type: timestamp_ntz 
          description: The date when the order has been delivered to the customer
          
  - name: brazil_state_to_region
    description: A macro that groups the brazilian states by regions.
    arguments:
        - name: column_state 
          type: string 
          description: The state of the city 